name: harness-ci

# Authoritative, agent-proof enforcement: these checks run on a trusted runner
# the agent cannot influence, so the file-lock and contract guarantees hold even
# if the local pre-commit hooks were skipped during the run.
#
# IMPORTANT deployment prerequisite: the file-scope guarantee is authoritative on
# the `pull_request` event *before* merge. On a `push` to `main` the diff range is
# empty (base == head), so the re-check cannot run and is advisory only. You MUST
# configure GitHub BRANCH PROTECTION on `main` to (a) forbid direct pushes and
# (b) require this `harness-ci` check to pass before merge -- otherwise a direct
# push bypasses enforcement entirely. See docs/setup-and-usage.md
# ("Required GitHub branch protection").

on:
  pull_request:
  push:
    branches: [main]

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff + staleness)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy --strict harness

      - name: Tests
        run: pytest -q

      - name: Server-side file-lock + contract re-check
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref || 'origin/main' }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
          # On `push` (only `main` triggers it) there is no PR branch to resolve a
          # task from and the diff is empty, so opt out of the fail-closed file-scope
          # gate to keep the post-merge job green. ci_enforce reads GITHUB_EVENT_NAME
          # (a runner default) and prints an explicit advisory naming the branch-
          # protection prerequisite instead of a misleading "human-authored" skip.
          HARNESS_NON_AGENT_OK: ${{ github.event_name == 'push' && '1' || '' }}
        run: python harness/ci_enforce.py
