name: harness-ci

# Authoritative, agent-proof enforcement: these checks run on a trusted runner
# the agent cannot influence, so the file-lock and contract guarantees hold even
# if the local pre-commit hooks were skipped during the run.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff + staleness)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy --strict --ignore-missing-imports harness

      - name: Tests
        run: pytest -q

      - name: Server-side file-lock + contract re-check
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref || 'origin/main' }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: python harness/ci_enforce.py
