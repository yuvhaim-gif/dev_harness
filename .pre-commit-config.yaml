minimum_pre_commit_version: "3.2.0"   # `pre-commit` stage name requires >= 3.2.0
default_stages: [pre-commit]

repos:
  # LAYER 1: SYNTAX & FORMAT
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        files: \.(yaml|yml)$
      - id: check-json
        files: \.json$
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: trailing-whitespace
      - id: end-of-file-fixer

  # LAYER 2: LINT & TYPES
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        pass_filenames: false
        args: ["--strict", "harness"]
        additional_dependencies: ["types-PyYAML>=6.0", "pytest>=7.0"]

  # LAYER 3: LEDGER INTEGRITY + FILE-LOCK ENFORCEMENT
  - repo: local
    hooks:
      - id: validate-agents-ledger
        name: "Validate AGENTS.md is loadable YAML with required keys"
        language: python
        entry: python harness/validate_agents_ledger.py
        additional_dependencies: ["pyyaml>=6.0"]
        files: ^AGENTS\.md$
        pass_filenames: false

      - id: enforce-file-locks
        name: "Enforce agent file locks"
        language: python
        entry: python harness/enforce_file_locks.py
        additional_dependencies: ["pyyaml>=6.0"]
        pass_filenames: false
        always_run: true

      - id: verify-contract-manifest
        name: "Verify hashed contract manifest matches contracts"
        language: python
        entry: python harness/contract_manifest.py
        additional_dependencies: ["pyyaml>=6.0"]
        pass_filenames: false
        always_run: true

      - id: enforce-contract-binding
        name: "Require contract changes to carry manifest + bound tests"
        language: python
        entry: python harness/enforce_contract_binding.py
        additional_dependencies: ["pyyaml>=6.0"]
        pass_filenames: false
        always_run: true

      - id: validate-okf
        name: "Enforce OKF conformance of the spec_docs info layer"
        language: python
        entry: python harness/validate_okf.py
        additional_dependencies: ["pyyaml>=6.0"]
        pass_filenames: false
        always_run: true
